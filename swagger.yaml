openapi: 3.0.0
info:
  title: TP Backend API
  description: API para el TP de Introducción al Desarrollo de Software
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Desarrollo

tags:
  - name: Users
  - name: Partidos
  - name: Ranking

paths:
  /users/register:
    post:
      tags: [Users]
      summary: Register user
      description: Crea un nuevo usuario en el sistema con email, name y password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /users/{user_id}:
    get:
      tags: [Users]
      summary: Get user by id
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Detalle del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Users]
      summary: Update user
      description: Actualiza el nombre y email de un usuario existente.
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Usuario actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Users]
      summary: Delete user
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Usuario eliminado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /usuarios:
    get:
      tags: [Users]
      summary: List users
      description: Lista paginada de usuarios (implementación actual usa page/limit/sort_by/order).
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
        - name: sort_by
          in: query
          required: false
          schema: { type: string, default: id }
        - name: order
          in: query
          required: false
          schema: { type: string, enum: [asc, desc], default: asc }
      responses:
        '200':
          description: Lista de usuarios devuelta exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /partidos:
    get:
      tags: [Partidos]
      summary: Listar partidos (sin resultados)
      description: Obtiene una lista paginada de partidos. Permite filtrar por equipo, fecha o fase.
      parameters:
        - name: equipo
          in: query
          required: false
          schema: { type: string }
          description: Filtra partidos donde el equipo juegue de local o visitante
        - name: fecha
          in: query
          required: false
          schema: { type: string, format: date }
          description: Filtra por fecha exacta (ej. 2026-06-15)
        - name: fase
          in: query
          required: false
          schema: { type: string }
          description: Filtra por la fase del torneo
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 10 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Lista de partidos devuelta exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartidoListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Partidos]
      summary: Crear un partido
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartidoCreateRequest'
      responses:
        '201':
          description: Partido creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartidoDetalleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /partidos/{partido_id}:
    get:
      tags: [Partidos]
      summary: Obtener detalle de un partido
      parameters:
        - $ref: '#/components/parameters/PartidoId'
      responses:
        '200':
          description: Detalle del partido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartidoDetalleResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Partidos]
      summary: Reemplazo total de datos del partido (opcional)
      parameters:
        - $ref: '#/components/parameters/PartidoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartidoReemplazoRequest'
      responses:
        '200':
          description: Partido actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartidoDetalleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Partidos]
      summary: Eliminar un partido
      parameters:
        - $ref: '#/components/parameters/PartidoId'
      responses:
        '200':
          description: Partido eliminado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchDeleteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /partidos/{partido_id}/resultado:
    put:
      tags: [Partidos]
      summary: Cargar o actualizar resultado
      description: Establece o modifica los goles del partido. Los goles deben ser enteros mayores o iguales a cero.
      parameters:
        - $ref: '#/components/parameters/PartidoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartidoResultadoRequest'
      responses:
        '200':
          description: Resultado guardado; cuerpo con el detalle del partido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartidoDetalleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /partidos/{partido_id}/prediccion:
    post:
      tags: [Partidos]
      summary: Registrar una predicción para un partido
      description: Body usa claves del PDF (id_usuario, local, visitante).
      parameters:
        - $ref: '#/components/parameters/PartidoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrediccionRequest'
      responses:
        '201':
          description: Predicción registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflicto (predicción ya existe)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /ranking:
    get:
      tags: [Ranking]
      summary: Ranking de usuarios por puntos de predicciones
      description: Paginación con limit y offset; incluye enlaces HATEOAS (first, prev, next, last).
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Listado paginado del ranking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RankingListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    UserId:
      name: user_id
      in: path
      required: true
      schema: { type: integer, minimum: 1 }
    PartidoId:
      name: partido_id
      in: path
      required: true
      schema: { type: integer, minimum: 1 }

  responses:
    BadRequest:
      description: Solicitud incorrecta
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error, status_code]
      properties:
        error: { type: string }
        status_code: { type: integer }

    MessageResponse:
      type: object
      required: [message, status_code]
      properties:
        message: { type: string }
        status_code: { type: integer }

    # Users
    UserCreateRequest:
      type: object
      required: [email, password, name]
      properties:
        email: { type: string, format: email, example: test@example.com }
        password: { type: string, minLength: 6, example: password123 }
        name: { type: string, example: Juan Pérez }

    UserUpdateRequest:
      type: object
      required: [name, email]
      properties:
        name: { type: string, example: Carlos Updated }
        email: { type: string, format: email, example: carlos@gmail.com }

    UserCreateResponse:
      type: object
      required: [email, name, message, status_code]
      properties:
        email: { type: string, format: email }
        name: { type: string }
        message: { type: string, example: User created successfully }
        status_code: { type: integer, example: 201 }

    UserUpdateResponse:
      type: object
      required: [email, name, message, status_code]
      properties:
        email: { type: string, format: email }
        name: { type: string }
        message: { type: string, example: Usuario actualizado correctamente }
        status_code: { type: integer, example: 200 }

    UserDetailResponse:
      type: object
      required: [id, name, email, status_code]
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: Juan Pérez }
        email: { type: string, format: email, example: juan@example.com }
        status_code: { type: integer, example: 200 }

    UserListResponse:
      type: object
      required: [users, message, status_code]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserDetail'
        message: { type: string, example: Users list retrieved successfully }
        status_code: { type: integer, example: 200 }

    UserDetail:
      type: object
      required: [id, name, email]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }

    # Partidos (API contract in Spanish keys)
    PartidoCreateRequest:
      type: object
      required: [equipo_local, equipo_visitante, fecha, fase]
      properties:
        equipo_local: { type: string, minLength: 1, example: Argentina }
        equipo_visitante: { type: string, minLength: 1, example: Brasil }
        fecha: { type: string, format: date-time, example: '2026-06-15T18:00:00' }
        fase: { type: string, minLength: 1, example: Fase de grupos }

    PartidoReemplazoRequest:
      allOf:
        - $ref: '#/components/schemas/PartidoCreateRequest'

    PartidoResultadoRequest:
      type: object
      required: [goles_local, goles_visitante]
      properties:
        goles_local: { type: integer, minimum: 0, example: 2 }
        goles_visitante: { type: integer, minimum: 0, example: 1 }

    PartidoSinResultado:
      type: object
      required: [id, equipo_local, equipo_visitante, fecha, fase]
      properties:
        id: { type: integer, example: 1 }
        equipo_local: { type: string, example: Argentina }
        equipo_visitante: { type: string, example: Brasil }
        fecha: { type: string, format: date-time, description: Fecha y hora del partido }
        fase: { type: string, example: Fase de grupos }

    PartidoDetalleResponse:
      type: object
      required: [id, equipo_local, equipo_visitante, fecha, fase, goles_local, goles_visitante, status_code]
      properties:
        id: { type: integer, example: 1 }
        equipo_local: { type: string, example: Argentina }
        equipo_visitante: { type: string, example: Brasil }
        estadio: { type: string, nullable: true }
        ciudad: { type: string, nullable: true }
        fecha: { type: string, format: date-time }
        fase: { type: string }
        goles_local: { type: integer, minimum: 0 }
        goles_visitante: { type: integer, minimum: 0 }
        status_code: { type: integer, example: 200 }

    PaginationLinks:
      type: object
      properties:
        first: { type: string }
        prev: { type: string }
        next: { type: string }
        last: { type: string }

    PartidoListResponse:
      type: object
      required: [items, total, _links, status_code]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PartidoSinResultado'
        total: { type: integer, example: 10 }
        _links:
          $ref: '#/components/schemas/PaginationLinks'
        status_code: { type: integer, example: 200 }

    MatchDeleteResponse:
      type: object
      required: [message, status_code]
      properties:
        message: { type: string, example: El partido se eliminó correctamente }
        status_code: { type: integer, example: 200 }

    PrediccionRequest:
      type: object
      required: [id_usuario, local, visitante]
      properties:
        id_usuario: { type: integer, minimum: 1, example: 1 }
        local: { type: integer, minimum: 0, example: 2 }
        visitante: { type: integer, minimum: 0, example: 1 }

    # Ranking (API contract in Spanish keys)
    RankingEntry:
      type: object
      required: [id_usuario, puntos]
      properties:
        id_usuario: { type: integer, example: 1 }
        puntos: { type: integer, example: 3 }

    RankingListResponse:
      type: object
      required: [data, links, status_code]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/RankingEntry'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        status_code: { type: integer, example: 200 }
