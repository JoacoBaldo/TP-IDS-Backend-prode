openapi: 3.0.0
info:
  title: TP Backend API
  description: API para el TP de Introducción al Desarrollo de Software
  version: 1.0.0
servers:
- url: http://localhost:5000
  description: Desarrollo
paths:
  /register:
    post:
      tags:
      - Users
      summary: Crear un nuevo usuario
      description: Crea un nuevo usuario en el sistema con email y password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '201':
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Error en la solicitud (datos inválidos o email ya existe)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /partidos/{id}/prediccion:
    parameters:
    - $ref: '#/components/parameters/IdPartido'
    post:
      summary: Registrar una predicción para un partido
      tags:
      - Predicciones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Prediccion'
      responses:
        '201':
          $ref: '#/components/responses/Created'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  schemas:
    User:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
          description: Email del usuario
          example: test@example.com
        password:
          type: string
          minLength: 6
          description: Password del usuario (mínimo 6 caracteres)
          example: password123
    UserResponse:
      type: object
      properties:
        email:
          type: string
          description: Email del usuario creado
          example: test@example.com
        message:
          type: string
          description: Mensaje de respuesta
          example: Usuario creado exitosamente
        status_code:
          type: integer
          description: Código de estado HTTP
          example: 201
    ErrorResponse:
      type: object
      required:
      - error
      - status_code
      properties:
        error:
          type: string
          description: Mensaje de error
          example: Email ya existe
        status_code:
          type: integer
          description: Código de estado HTTP
          example: 400
    Prediccion:
      type: object
      required:
      - id_usuario
      - local
      - visitante
      properties:
        id_usuario:
          type: integer
          example: 1
        local:
          type: integer
          minimum: 0
          example: 2
        visitante:
          type: integer
          minimum: 0
          example: 1
  parameters:
    IdPartido:
      name: id
      in: path
      required: true
      description: Identificador del partido
      schema:
        type: integer
        minimum: 1
  responses:
    Created:
      description: Requisito procesado exitosamente y recurso creado
      content:
        application/json:
          schema:
            type: object
            properties:
              status_code:
                type: integer
                example: 201
              message:
                type: string
                example: Predicción registrada con éxito
    BadRequest:
      description: Error en la petición (datos faltantes o inválidos)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflicto (La predicción ya existe)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
