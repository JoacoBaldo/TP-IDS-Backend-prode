openapi: 3.0.0
info:
  title: TP Backend API
  description: API para el TP de Introducción al Desarrollo de Software
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Desarrollo

paths:
  /users/register:
    post:
      tags:
        - Users
      summary: Crear un nuevo usuario
      description: Crea un nuevo usuario en el sistema con email, name y password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '201':
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Error en la solicitud (datos inválidos)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /partidos/{partido_id}/resultado:
    put:
      tags:
        - Partidos
      summary: Cargar o actualizar resultado
      description: |
        Establece o modifica los goles del partido. Los goles deben ser enteros mayores o iguales a cero.
      parameters:
        - name: partido_id
          in: path
          required: true
          description: Identificador del partido
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartidoResultadoRequest'
      responses:
        '200':
          description: Resultado guardado; cuerpo con el detalle del partido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartidoDetalleResponse'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Partido no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /partidos/{partido_id}:
    put:
      tags:
        - Partidos
      summary: Reemplazo total de datos del partido (opcional)
      description: |
        Reemplaza los campos obligatorios del partido (equipo local, equipo visitante, fecha, fase).
        No modifica estadio, ciudad ni resultado ya cargado salvo que otra operación lo haga.
      parameters:
        - name: partido_id
          in: path
          required: true
          description: Identificador del partido
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartidoReemplazoRequest'
      responses:
        '200':
          description: Partido actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartidoDetalleResponse'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Partido no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /partidos:
    get:
      tags:
        - Partidos
      summary: Listar partidos
      description: Obtiene una lista paginada de partidos. Permite filtrar por equipo, fecha o fase.
      parameters:
        - in: query
          name: equipo
          schema:
            type: string
          description: Filtra partidos donde el equipo juegue de local o visitante
        - in: query
          name: fecha
          schema:
            type: string
            format: date
          description: Filtra por fecha exacta (ej. 2026-06-15)
        - in: query
          name: fase
          schema:
            type: string
          description: Filtra por la fase del torneo
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista de partidos devuelta exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PartidoSinResultado'
                  total:
                    type: integer
                  _links:
                    type: object
                  status_code:
                    type: integer
                    example: 200
  
  /partidos/{id}:
    get:
      tags:
        - Partidos
      summary: Obtener detalle de un partido
      description: Devuelve toda la información de un partido específico usando su ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Identificador del partido
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Partido encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartidoDetalleResponse'
        '404':
          description: Partido no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    User:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
          description: Email del usuario
          example: test@example.com
        password:
          type: string
          minLength: 6
          description: Password del usuario (mínimo 6 caracteres)
          example: password123
        name:
          type: string
          description: Nombre del usuario
          example: Juan Pérez

    UserResponse:
      type: object
      properties:
        email:
          type: string
          description: Email del usuario creado
          example: test@example.com
        name:
          type: string
          description: Nombre del usuario creado
          example: Juan Pérez
        message:
          type: string
          description: Mensaje de respuesta
          example: User created successfully
        status_code:
          type: integer
          description: Código de estado HTTP
          example: 201

    ErrorResponse:
      type: object
      required:
        - error
        - status_code
      properties:
        error:
          type: string
          description: Mensaje de error
          example: Email ya existe
        status_code:
          type: integer
          description: Código de estado HTTP
          example: 400

    PartidoSinResultado:
      type: object
      properties:
        id:
          type: integer
          example: 1
        equipo_local:
          type: string
          example: Argentina
        equipo_visitante:
          type: string
          example: Brasil
        fecha:
          type: string
          format: date-time
          description: Fecha y hora del partido
        fase:
          type: string
          example: Fase de grupos
    PartidoResultadoRequest:
      type: object
      required:
        - goles_local
        - goles_visitante
      properties:
        goles_local:
          type: integer
          minimum: 0
          description: Goles del equipo local
          example: 2
        goles_visitante:
          type: integer
          minimum: 0
          description: Goles del equipo visitante
          example: 1

    PartidoReemplazoRequest:
      type: object
      required:
        - equipo_local
        - equipo_visitante
        - fecha
        - fase
      properties:
        equipo_local:
          type: string
          minLength: 1
          description: Equipo local
          example: Argentina
        equipo_visitante:
          type: string
          minLength: 1
          description: Equipo visitante
          example: Brasil
        fecha:
          type: string
          format: date-time
          description: Fecha y hora del partido (ISO 8601)
          example: '2026-06-15T18:00:00'
        fase:
          type: string
          minLength: 1
          description: Fase del torneo
          example: Fase de grupos

    PartidoDetalleResponse:
      type: object
      required:
        - id
        - equipo_local
        - equipo_visitante
        - fecha
        - fase
        - goles_local
        - goles_visitante
        - status_code
      properties:
        id:
          type: integer
          description: Identificador del partido
          example: 1
        equipo_local:
          type: string
          example: Argentina
        equipo_visitante:
          type: string
          example: Brasil
        estadio:
          type: string
          nullable: true
          description: Estadio (si está cargado en el fixture)
        ciudad:
          type: string
          nullable: true
          description: Ciudad (si está cargada en el fixture)
        fecha:
          type: string
          format: date-time
          description: Fecha y hora del partido
        fase:
          type: string
          example: Fase de grupos
        goles_local:
          type: integer
          minimum: 0
          description: Goles del local (0 si aún no se cargó resultado)
        goles_visitante:
          type: integer
          minimum: 0
          description: Goles del visitante (0 si aún no se cargó resultado)
        status_code:
          type: integer
          description: Código de estado HTTP
          example: 200
