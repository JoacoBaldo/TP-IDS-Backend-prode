openapi: 3.0.0
info:
  title: TP Backend API
  description: API para el TP de Introducción al Desarrollo de Software
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Desarrollo

paths:
  /register:
    post:
      tags:
        - Users
      summary: Crear un nuevo usuario
      description: Crea un nuevo usuario en el sistema con email y password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '201':
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Error en la solicitud (datos inválidos o email ya existe)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ranking:
    get:
      tags:
        - Ranking
      summary: Ranking de usuarios por puntos de predicciones
      description: |
        Devuelve usuarios ordenados por puntos obtenidos al comparar predicciones
        con resultados reales ya cargados (marcador exacto 3 pts; acierto de resultado 1 pt; fallo 0).
        Paginación con limit y offset; incluye enlaces HATEOAS (first, prev, next, last).
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Cantidad de registros por página
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Desplazamiento desde el inicio del listado
      responses:
        '200':
          description: Listado paginado del ranking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RankingListResponse'
        '400':
          description: Parámetros de paginación inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    User:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: Email del usuario
          example: test@example.com
        password:
          type: string
          minLength: 6
          description: Password del usuario (mínimo 6 caracteres)
          example: password123

    UserResponse:
      type: object
      properties:
        email:
          type: string
          description: Email del usuario creado
          example: test@example.com
        message:
          type: string
          description: Mensaje de respuesta
          example: Usuario creado exitosamente
        status_code:
          type: integer
          description: Código de estado HTTP
          example: 201

    ErrorResponse:
      type: object
      required:
        - error
        - status_code
      properties:
        error:
          type: string
          description: Mensaje de error
          example: Email ya existe
        status_code:
          type: integer
          description: Código de estado HTTP
          example: 400

    RankingEntry:
      type: object
      required:
        - id_usuario
        - puntos
      properties:
        id_usuario:
          type: integer
          description: Identificador del usuario
        puntos:
          type: integer
          description: Puntos acumulados según reglas del Prode

    PaginationLinks:
      type: object
      properties:
        first:
          type: string
        prev:
          type: string
        next:
          type: string
        last:
          type: string

    RankingListResponse:
      type: object
      required:
        - data
        - links
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/RankingEntry'
        links:
          $ref: '#/components/schemas/PaginationLinks'
