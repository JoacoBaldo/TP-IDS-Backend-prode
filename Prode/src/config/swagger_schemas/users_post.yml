tags:
  - Users
summary: Crear un nuevo usuario
description: Crea un nuevo usuario en el sistema con email y password
consumes:
  - application/json
produces:
  - application/json
parameters:
  - in: body
    name: user
    description: Usuario a crear
    required: true
    schema:
      $ref: '#/definitions/User'
responses:
  201:
    description: Usuario creado exitosamente
    schema:
      $ref: '#/definitions/UserResponse'
  400:
    description: Error en la solicitud (datos inválidos o email ya existe)
    schema:
      $ref: '#/definitions/ErrorResponse'
