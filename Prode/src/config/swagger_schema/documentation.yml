tags:
  - Users
summary: Crear un nuevo usuario
description: Crea un nuevo usuario en el sistema con email y password
consumes:
  - application/json
produces:
  - application/json
parameters:
  - in: body
    name: user
    description: Usuario a crear
    required: true
    schema:
      $ref: '#/definitions/User'
responses:
  201:
    description: Usuario creado exitosamente
    schema:
      $ref: '#/definitions/UserResponse'
  400:
    description: Error en la solicitud (datos inválidos)
    schema:
      $ref: '#/definitions/ErrorResponse'
  400:
    description: Email ya existe
    schema:
      $ref: '#/definitions/ErrorResponse'

definitions:
  User:
    type: object
    required:
      - email
      - password
    properties:
      email:
        type: string
        format: email
        description: Email del usuario
        example: test@example.com
      password:
        type: string
        minLength: 6
        description: Password del usuario (mínimo 6 caracteres)
        example: password123

  UserResponse:
    type: object
    properties:
      email:
        type: string
        description: Email del usuario creado
        example: test@example.com
      message:
        type: string
        description: Mensaje de respuesta
        example: Usuario creado exitosamente
      status_code:
        type: integer
        description: Código de estado HTTP
        example: 201

  ErrorResponse:
    type: object
    required:
      - error
      - status_code
    properties:
      error:
        type: string
        description: Mensaje de error
        example: Email ya existe
      status_code:
        type: integer
        description: Código de estado HTTP
        example: 400
